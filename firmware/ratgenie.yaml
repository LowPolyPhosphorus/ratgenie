esphome:
  name: ratgenie
  friendly_name: RatGenie

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ratgenie fallback"
    password: !secret fallback_password

captive_portal:

binary_sensor:
  - platform: template
    name: "Garage Door Open"
    id: garage_door_open
    device_class: opening

switch:
  - platform: gpio
    pin: GPIO26
    id: door_relay
    name: "door relay"
    restore_mode: ALWAYS_OFF

cover:
  - platform: template
    name: "garage door"
    device_class: garage
    open_action:
      - switch.turn_on: door_relay
      - delay: 500ms
      - switch.turn_off: door_relay
    close_action:
      - switch.turn_on: door_relay
      - delay: 500ms
      - switch.turn_off: door_relay
    stop_action:
      - switch.turn_on: door_relay
      - delay: 500ms
      - switch.turn_off: door_relay
    optimistic: true  

light:
  - platform: status_led
    id: ratgenie_status
    name: "ratgenie status"
    pin:
      number: GPIO2
      inverted: true

interval:
  - interval: 5s 
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                id: ratgenie_status
                flash_length: 100ms
          else:
            - light.turn_off: ratgenie_status

button:
  - platform: restart
    name: "ratgenie restart"

  - platform: template
    name: "trigger door"
    on_press:
      then:
        - switch.turn_on: door_relay
        - delay: 500ms
        - switch.turn_off: door_relay
